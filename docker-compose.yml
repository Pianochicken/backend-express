services:
  backend-express:
    build:
      context: .
      target: prod
    image: backend-express:latest
    container_name: backend-express
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env.production
    environment:
      DB_HOST: backend-express-db
      DB_PORT: 5432
    depends_on:
      - backend-express-db
    restart: unless-stopped

  backend-express-db:
    image: postgres:16-alpine
    container_name: backend-express-db
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - dbdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  dbdata: